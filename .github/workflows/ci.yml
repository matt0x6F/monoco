name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # monoco's --since needs full history to diff against the base.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Affected tests (PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: go run ./cmd/monoco test --since "origin/${BASE_REF}"
      - name: All tests (push)
        if: github.event_name != 'pull_request'
        run: go run ./cmd/monoco test --all